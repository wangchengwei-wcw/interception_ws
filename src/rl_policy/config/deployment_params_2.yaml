swarm_state_manager:
  publish_hz: 50.0
  input_timeout_sec: 0.5
  target_wait_log_period_sec: 3.0
  observation_status_log_period_sec: 3.0
  world_origin_xyz:
  - 0.0
  - 0.0
  - 0.0
  friend_odom_topics:
  - /uav0/odom
  - /uav1/odom
  enemy_odom_topics:
  - /enemy0/odom
  - /enemy1/odom
  enemy_exists_topic: /enemy_target_manager/enemy_exists
  enemy_frozen_topic: /enemy_target_manager/enemy_frozen
  obs_k_friends: 1
  obs_k_target: 2
  obs_k_friend_targetpos: 2
  fov_horizontal_deg: 60.0
  fov_vertical_deg: 45.0
  max_visible_distance: 6.0
  hit_radius: 0.15
  friendly_states_topic: /swarm_state_manager/friendly_states
  target_states_topic: /swarm_state_manager/target_states
  target_visibility_topic: /swarm_state_manager/target_visibility
  policy_raw_obs_topic: /swarm_state_manager/policy_raw_obs_all
  hit_enemy_indices_topic: /swarm_state_manager/hit_enemy_indices
  enemy_alive_topic: /enemy_target_manager/enemy_alive
  require_enemy_alive_for_policy_obs: true
  reset_latches_on_new_enemy_alive: true
  clear_hit_indices_when_no_alive_enemy: true

policy_control_node:
  bundle_dir: /home/wcw/interception_ws/src/rl_policy/policy
  device: cpu
  output_hz: 50.0
  policy_status_log_period_sec: 3.0
  policy_raw_obs_topic: /swarm_state_manager/policy_raw_obs_all
  friendly_states_topic: /swarm_state_manager/friendly_states
  per_agent_command_topics:
  - /uav0/policy/command
  - /uav1/policy/command
  per_agent_command_stamped_topics:
  - /uav0/policy/command_stamped
  - /uav1/policy/command_stamped
  hover_accel_command:
  - 0.0
  - 0.0
  - 0.0
  hover_yaw_rate_command: 0.0
  require_target_alive_for_policy: true
  enemy_alive_topic: /enemy_target_manager/enemy_alive
  target_gate_timeout_sec: 0.5

policy_cmd_bridge:
  bundle_dir: /home/wcw/interception_ws/src/rl_policy/policy
  num_agents: 2
  policy_command_topics:
  - /uav0/policy/command
  - /uav1/policy/command
  odom_topics:
  - /uav0/odom
  - /uav1/odom
  px4_command_topics:
  - /uav0/position_cmd
  - /uav1/position_cmd
  hit_enemy_indices_topic: /swarm_state_manager/hit_enemy_indices
  publish_hz: 200.0
  command_frame_id: world
  hover_mode: explicit
  jerk_mode: zero
  jerk_limit: 0.0
  kx:
  - 0.0
  - 0.0
  - 0.0
  kv:
  - 0.0
  - 0.0
  - 0.0
  policy_cmd_timeout_sec: 0.3
  no_policy_behavior: stop

enemy_target_manager:
  frame_id: world
  publish_rate: 200.0
  enemy_size: 2
  friend_odom_topics:
  - /uav0/odom
  - /uav1/odom
  enemy_odom_topics:
  - /enemy0/odom
  - /enemy1/odom
  friendly_states_topic: /swarm_state_manager/friendly_states
  hit_enemy_indices_topic: /swarm_state_manager/hit_enemy_indices
  enemy_motion_mode: force_field
  enemy_speed: 1.0
  enemy_goal_radius: 0.1
  goal_xyz:
  - 0.0
  - 0.0
  - 1.0
  enemy_goal_attraction_weight: 3.0
  enemy_pursuer_repulsion_weight: 1.5
  enemy_pursuer_repulsion_range: 40.0
  enemy_pursuer_repulsion_smooth: 1.0
  enemy_pursuer_repulsion_max: 2.0
  enemy_separation_weight: 0.2
  enemy_separation_range: 1.5
  enemy_cohesion_weight: 0.2
  enemy_cohesion_range: 5.0
  enemy_evasive_eps: 1.0e-06
  spawn_on_start: true
  formation_id: 6
  formation_type: random
  enemy_cluster_ring_radius: 5.0
  enemy_cluster_radius: 1.0
  enemy_height_min: 1.0
  enemy_height_max: 1.0
  enemy_min_separation_min: 1.0
  enemy_min_separation_max: 2.0
  random_seed: 0
  fixed_spawn_theta_deg: 0.0
  require_friend_yaw_aligned: true
  yaw_align_tolerance_deg: 5.0
  yaw_align_command_rate: 0.8
  yaw_align_command_topics:
  - /uav0/position_cmd
  - /uav1/position_cmd
  yaw_align_kx:
  - 0.0
  - 0.0
  - 0.0
  yaw_align_kv:
  - 0.0
  - 0.0
  - 0.0
  freeze_when_reach_goal: false
  terminate_on_goal_reach: true
  stop_publish_after_terminate: true
  clear_markers_on_terminate: true
  freeze_enemy_on_hit: true
  keep_exists_true_when_hit: true
  publish_markers: true
  marker_topic: /enemy_targets/markers
  enemy_marker_scale: 0.25
  goal_marker_scale: 0.35
  arrow_shaft_d: 0.06
  arrow_head_d: 0.12
  arrow_head_l: 0.18
  show_velocity_arrows: true
  show_text: true
  show_trails: false
  trail_length: 80
  hit_freeze_requires_motion_released: true
  hit_freeze_min_age_sec: 0.2
  hit_freeze_validate_distance: true
  hit_freeze_radius: 0.3
  hit_ignore_negative_indices: true
  hit_log_ignored: true
